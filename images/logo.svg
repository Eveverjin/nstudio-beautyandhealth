<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 400" fill="none">

  <!-- ── Oval outline with gap on right side for text ── -->
  <!-- ellipse: cx=165 cy=212 rx=122 ry=170            -->
  <!-- gap endpoints: P1=(276,140) P2=(277,281)         -->
  <path stroke="#8A8768" stroke-width="1.7"
        d="M 276,140 A 122,170 0 1 1 277,281"/>

  <!-- tick lines flanking the gap -->
  <line stroke="#8A8768" stroke-width="1.4"
        x1="276" y1="140" x2="305" y2="140"/>
  <line stroke="#8A8768" stroke-width="1.4"
        x1="277" y1="281" x2="305" y2="281"/>

  <!-- BEAUTY & HEALTH — rotated 90° clockwise, centred in gap -->
  <text fill="#8A8768"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" letter-spacing="1.8"
        text-anchor="middle" dominant-baseline="middle"
        transform="rotate(90,312,211)" x="312" y="211">BEAUTY &amp; HEALTH</text>

  <!-- ── Rose centred at (165, 96) ── -->
  <g transform="translate(165,96)" fill="#8A8768">

    <!-- 5 outer petals -->
    <path d="M0,-8 C8,-11 14,-34 0,-54 C-14,-34 -8,-11 0,-8" transform="rotate(0)"/>
    <path d="M0,-8 C8,-11 14,-34 0,-54 C-14,-34 -8,-11 0,-8" transform="rotate(72)"/>
    <path d="M0,-8 C8,-11 14,-34 0,-54 C-14,-34 -8,-11 0,-8" transform="rotate(144)"/>
    <path d="M0,-8 C8,-11 14,-34 0,-54 C-14,-34 -8,-11 0,-8" transform="rotate(216)"/>
    <path d="M0,-8 C8,-11 14,-34 0,-54 C-14,-34 -8,-11 0,-8" transform="rotate(288)"/>

    <!-- 5 inner petals (offset 36°, shorter) -->
    <path d="M0,-8 C5,-9 8,-22 0,-35 C-8,-22 -5,-9 0,-8" transform="rotate(36)"/>
    <path d="M0,-8 C5,-9 8,-22 0,-35 C-8,-22 -5,-9 0,-8" transform="rotate(108)"/>
    <path d="M0,-8 C5,-9 8,-22 0,-35 C-8,-22 -5,-9 0,-8" transform="rotate(180)"/>
    <path d="M0,-8 C5,-9 8,-22 0,-35 C-8,-22 -5,-9 0,-8" transform="rotate(252)"/>
    <path d="M0,-8 C5,-9 8,-22 0,-35 C-8,-22 -5,-9 0,-8" transform="rotate(324)"/>

    <!-- Rose center -->
    <circle r="8"/>

    <!-- Side accent leaves -->
    <path d="M-28,-22 C-44,-14 -48,0 -40,8 C-38,-2 -31,-14 -28,-22"/>
    <path d="M 28,-22 C 44,-14 48,0 40,8 C 38,-2 31,-14 28,-22"/>

    <!-- Lower leaves at base of flower head -->
    <path d="M0,8 C-20,16 -30,36 -20,50 C-13,36 -5,18 0,8"/>
    <path d="M0,8 C 20,16  30,36  20,50 C 13,36  5,18 0,8"/>

    <!-- Stem -->
    <rect x="-1.2" y="50" width="2.4" height="22" rx="1.2"/>
  </g>

  <!-- ── Large N ── -->
  <text fill="#8A8768"
        x="165" y="340"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="158"
        font-weight="400">N</text>

</svg>
